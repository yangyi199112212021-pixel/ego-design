<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ego and ... | Project</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="detail-page">
    <header class="detail-header" aria-label="Project navigation">
      <a class="detail-brand" href="index.html#projects">ego and ...</a>
      <nav class="detail-actions">
        <a class="detail-admin" href="admin.html#projects-admin">Edit</a>
        <a class="detail-close" href="index.html#projects">Close</a>
      </nav>
    </header>

    <div class="ticker detail-ticker" aria-label="Categories">
      <div class="ticker-track" data-tags></div>
    </div>

    <main class="detail-template">
      <section class="detail-intro" aria-labelledby="detail-title">
        <div class="detail-title-block">
          <h1 id="detail-title" data-detail-project-title></h1>
          <div class="detail-credit">
            <p><span>art :</span> <strong data-detail-client></strong></p>
            <p><span>design :</span> <strong data-detail-category></strong></p>
          </div>
        </div>
        <p class="detail-description detail-description-en" data-detail-description-en></p>
        <div class="detail-info-block">
          <h2>INFO</h2>
          <p class="detail-description detail-description-zh" data-detail-description-zh></p>
        </div>
      </section>

      <section class="detail-gallery" data-detail-gallery aria-label="Project images"></section>
    </main>

    <footer class="detail-footer">
      <p>© All rights Reserved by ego</p>
    </footer>

    <script src="site-data.js"></script>
    <script src="site.js"></script>
  </body>
</html>
